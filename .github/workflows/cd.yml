name: CD Pipeline – Prod

on:
  push:
    branches: [ prod ]

jobs:

  # ── JOB 1 : Scan de sécurité ────────────────────────────────
  security-scan:
    name: Scan Sécurité avant déploiement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull de l'image depuis Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Scan Trivy (bloque si CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest
          format: table
          exit-code: 1
          severity: CRITICAL

  # ── JOB 2 : Déploiement sur runner_prod ─────────────────────
  deploy:
    name: Déploiement Production
    runs-on: [ self-hosted, runner_prod ]
    needs: security-scan
    steps:
      - name: Connexion Docker Hub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Arrêter l'ancien conteneur
        run: docker stop intranet-prod 2>/dev/null || true

      - name: Supprimer l'ancien conteneur
        run: docker rm intranet-prod 2>/dev/null || true

      - name: Pull de la dernière image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Déployer le conteneur sur le port 80
        run: |
          docker run -d \
            --name intranet-prod \
            --restart always \
            -p 80:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Vérifier que le site est accessible
        run: |
          sleep 5
          curl -f http://localhost:80 && echo "✅ Site accessible sur le port 80"
