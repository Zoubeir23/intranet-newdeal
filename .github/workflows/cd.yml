name: CD Pipeline – Prod

on:
  push:
    branches: [ prod ]

jobs:

  # ── JOB 1 : Scan de sécurité ────────────────────────────────
  security-scan:
    name: Scan Sécurité avant déploiement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull de l'image depuis Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Scan Trivy (bloque si CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest
          format: table
          exit-code: 1
          severity: CRITICAL

  # ── JOB 2 : Déploiement sur runner_prod ─────────────────────
  deploy:
    name: Déploiement Production
    runs-on: [ self-hosted, runner_prod ]
    needs: security-scan
    steps:
      - name: Connexion Docker Hub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Arrêter l'ancien conteneur
        run: docker stop intranet-prod 2>/dev/null || true

      - name: Supprimer l'ancien conteneur
        run: docker rm intranet-prod 2>/dev/null || true

      - name: Pull de la dernière image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Déployer le conteneur sur le port 80
        run: |
          docker run -d \
            --name intranet-prod \
            --restart always \
            -p 80:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:dev-latest

      - name: Vérifier que le site est accessible
        run: |
          sleep 5
          curl -f http://localhost:80 && echo "✅ Site accessible sur le port 80"

  # ── JOB NOTIFICATION EMAIL ──────────────────────────────────
  notify:
    name: Notification Email
    runs-on: ubuntu-latest
    needs: [ security-scan, deploy ]
    if: always()
    steps:
      - name: Envoyer email de succès
        if: ${{ needs.deploy.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ [CD] Déploiement prod – SUCCÈS – ${{ github.repository }}"
          body: |
            Le déploiement en production s'est terminé avec succès.
            Repository : ${{ github.repository }}
            Commit     : ${{ github.sha }}
            Auteur     : ${{ github.actor }}
            Site accessible sur : http://localhost:80
          to: moussawade@groupeisi.com
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Envoyer email d'échec
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ [CD] Déploiement prod – ÉCHEC – ${{ github.repository }}"
          body: |
            ATTENTION : Le déploiement en production a échoué.
            Repository : ${{ github.repository }}
            Commit     : ${{ github.sha }}
            Auteur     : ${{ github.actor }}
            Vérifiez les logs : ${{ github.server_url }}/${{ github.repository }}/actions
          to: moussawade@groupeisi.com
          from: ${{ secrets.EMAIL_USERNAME }}
